<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RSVP Reader</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <!-- HEADER -->
    <h1 id="desktopTitle">RSVP Speed Reader</h1>

    <!-- TEXT INPUT AREA -->
    <div id="textSection">
        <textarea id="inputText" placeholder="Paste your text here..."></textarea>

        <div class="row">
            <button id="loadBtn">Load Text</button>
            <button id="saveBtn">Save Text</button>
        </div>
    </div>

    <!-- PROGRESS BAR -->
    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>

    <!-- BIG WORD DISPLAY -->
    <div id="displayArea">

        <div id="bigWordContainer">
            <div id="bigWordInner">
                <span id="leftPart"></span>
                <span id="orpPart"></span>
                <span id="rightPart"></span>
            </div>
        </div>

        <div id="inlineContext"></div>

    </div>

</div>

<!-- MOBILE BOTTOM BAR (PRIMARY CONTROLS) -->
<div id="mobileControls">
    <button id="mPlay">▶</button>
    <button id="mPause">⏸</button>
    <button id="mBack">⟵5</button>
    <button id="mForward">5⟶</button>
    <button id="mRestart">⟳</button>
    <button id="mSettings">⚙</button>
</div>

<!-- SETTINGS DRAWER -->
<div id="settingsDrawer">

    <h2>Settings</h2>

    <div class="drawerRow">
        <label>WPM</label>
        <input type="range" id="d_wpmSlider" min="100" max="1000" value="300">
        <input type="number" id="d_wpmInput" value="300">
    </div>

    <div class="drawerRow">
        <label>Word Size</label>
        <input type="range" id="d_sizeSlider" min="20" max="96" value="48">
    </div>

    <div class="drawerRow">
        <label><input type="checkbox" id="d_toggleBig" checked> Show big centered word</label>
    </div>

    <div class="drawerRow">
        <label><input type="checkbox" id="d_toggleInline" checked> Show inline context</label>
    </div>

    <div class="drawerRow">
        <button id="d_baseColorBtn">Text Color</button>
        <button id="d_orpColorBtn">ORP Color</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
