<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RSVP Reader (Clean Build)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <h1>RSVP Speed Reader</h1>

    <textarea id="inputText" placeholder="Paste your text here, then press ▶ Play."></textarea>

    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>

    <!-- BIG WORD DISPLAY -->
    <div id="bigWordContainer">
        <div id="bigWordInner">
            <span id="bigWord"></span>
        </div>
    </div>

    <!-- INLINE CONTEXT -->
    <div id="inlineContext"></div>

    <!-- SETTINGS ALWAYS VISIBLE -->
    <div id="settingsPanel">

        <h2>Settings</h2>

        <div class="settingsRow">
            <label>WPM</label>
            <input type="range" id="wpmSlider" min="100" max="1000" value="300">
            <input type="number" id="wpmInput" value="300">
        </div>

        <div class="settingsRow">
            <label>Word Size</label>
            <input type="range" id="sizeSlider" min="20" max="96" value="48">
        </div>

        <div class="settingsRow">
            <label><input type="checkbox" id="toggleBig" checked> Show big word</label>
        </div>

        <div class="settingsRow">
            <label><input type="checkbox" id="toggleInline" checked> Show inline context</label>
        </div>

    </div>

</div>

<!-- CONTROL BAR -->
<div id="controlsBar">
    <button id="playBtn">▶</button>
    <button id="pauseBtn">⏸</button>
    <button id="backBtn">⟵5</button>
    <button id="forwardBtn">5⟶</button>
    <button id="restartBtn">⟳</button>
</div>

<script src="script.js"></script>
</body>
</html>
